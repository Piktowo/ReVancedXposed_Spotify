name: Android CI

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get random number
      id: random
      run: echo "NUMBER=$(shuf -i 1-10000 -n 1)" >> $GITHUB_OUTPUT

    - name: Build Release
      run: ./gradlew assembleUniversalRelease -PPACKAGE_NAME_SEED=${{ steps.random.outputs.NUMBER }}

    - name: Upload a Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rvxp-ci-release-apk
        path: |
          app/build/outputs/apk/universal/release
          app/build/outputs/mapping/universalRelease/mapping.txt

    - name: Create AutoBuild Release
      run: |
        GIT_DESCRIBE=$(git rev-parse --short HEAD)
        GIT_COMMIT_DATE=$(git log -1 --format=%cd --date=format:%y%m%d)
        # Collect commit messages since the last autobuild tag (fetch-depth: 0 ensures full history)
        # gh release delete does NOT delete the git tag, so autobuild tag always points to the prev build
        CHANGELOG=$(git log autobuild..HEAD --pretty=format:"- %s" 2>/dev/null || git log -10 --pretty=format:"- %s")
        # Write notes to a temp file to safely handle special characters (!, $, \, etc.) in commit messages
        NOTES_FILE=$(mktemp)
        printf 'Commit `%s`. The package name and signature of this build are different every day. You do not have to reinstall it every day.\n\n## Changelog\n%s\n' \
          "${GIT_DESCRIBE}" "${CHANGELOG}" > "$NOTES_FILE"
        cd app/build/outputs/apk/universal/release/
        mv app-universal-release.apk ReVancedXposedSpotify-${GIT_COMMIT_DATE}.apk
        gh release delete autobuild --yes || true
        gh release create autobuild ReVancedXposedSpotify-${GIT_COMMIT_DATE}.apk --latest --title "Build ${GIT_COMMIT_DATE}" --notes-file "$NOTES_FILE"
        rm -f "$NOTES_FILE"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}